<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>德州帳本</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>德州帳本</h1>
      <p id="syncStatus">正在連線…</p>
    </div>
    <button id="shareBtn" class="ghost">分享房間</button>
  </header>

  <main>
    <section id="joinCard" class="card">
      <h2>進入牌局群組</h2>
      <label>你的名字</label>
      <input id="displayName" placeholder="例如：荷婷" autocomplete="name">
      <label>群組代碼</label>
      <input id="roomCode" placeholder="例如：HT1103" autocapitalize="characters">
      <button id="joinBtn">進入群組</button>
      <p class="hint">同一組朋友輸入相同群組代碼，就會看到同一份即時帳目。</p>
    </section>

    <section id="appArea" class="hidden">
      <section class="card">
        <div class="row between">
          <div>
            <h2 id="roomTitle">群組</h2>
            <p id="currentDate" class="muted"></p>
          </div>
          <button id="leaveBtn" class="secondary small">切換群組</button>
        </div>

        <div class="grid-two">
          <input id="newPlayerName" placeholder="新增玩家姓名">
          <button id="addPlayerBtn">新增玩家</button>
        </div>

        <div id="players"></div>
      </section>

      <section class="card">
        <h2>本局驗帳</h2>
        <div class="totals">
          <div><span>總買入</span><strong id="totalBuyin">$0</strong></div>
          <div><span>總拿回</span><strong id="totalCashout">$0</strong></div>
          <div><span>差額</span><strong id="difference">$0</strong></div>
        </div>
        <p id="differenceHint" class="hint"></p>
        <div class="actions">
          <button id="finishBtn">完成本局</button>
          <button id="newGameBtn" class="secondary">開新局</button>
        </div>
      </section>

      <section class="card">
        <div class="row between">
          <h2>月／年統計</h2>
          <select id="reportRange">
            <option value="month">本月</option>
            <option value="year">今年</option>
            <option value="all">全部</option>
          </select>
        </div>
        <div id="report"></div>
      </section>

      <section class="card">
        <h2>備份與還原</h2>
        <div class="actions">
          <button id="backupBtn" class="secondary">下載備份</button>
          <label class="button secondary">
            還原備份
            <input id="restoreInput" type="file" accept="application/json,.json" hidden>
          </label>
        </div>
        <p class="hint">備份檔包含目前群組的所有牌局資料。</p>
      </section>
    </section>
  </main>

  <template id="playerTemplate">
    <article class="player">
      <div class="row between">
        <div>
          <h3 class="playerName"></h3>
          <p class="muted playerMeta"></p>
        </div>
        <button class="danger small removePlayer">刪除</button>
      </div>

      <div class="playerTotals">
        <div><span>投入</span><strong class="buyin">$0</strong></div>
        <div><span>拿回</span><strong class="cashout">$0</strong></div>
        <div><span>盈虧</span><strong class="profit">$0</strong></div>
      </div>

      <div class="quick">
        <button data-buyin="100">+100</button>
        <button data-buyin="200">+200</button>
        <button class="secondary customBuyin">自訂</button>
      </div>

      <div class="cashoutRow">
        <input class="cashoutInput" type="number" min="0" inputmode="numeric" placeholder="最後拿回金額">
        <button class="secondary saveCashout">儲存</button>
      </div>

      <details>
        <summary>查看買入紀錄</summary>
        <ul class="txList"></ul>
      </details>
    </article>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
