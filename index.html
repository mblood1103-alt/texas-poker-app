<!doctype html>
<html lang="zh-Hant">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>德州帳本</title>
  <link rel="manifest" href="manifest.webmanifest?v=10">
  <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
  <header class="top">
    <div>
      <h1>德州帳本</h1>
      <small id="status">連線中…</small>
    </div>
    <button id="logoutBtn" class="ghost hidden">登出</button>
  </header>

  <main>
    <section id="loginCard" class="card">
      <h2>進入德州帳本</h2>
      <button id="googleBtn">使用 Google 登入（房主）</button>
      <div class="sep">或</div>

      <label>你的名字</label>
      <input id="viewerName" placeholder="請輸入名稱">

      <label>群組代碼</label>
      <input id="roomCode" placeholder="請輸入群組代碼" autocapitalize="characters">
      <button id="viewerBtn" class="secondary">觀看帳目</button>

      <p class="hint">房主用 Google 登入；其他人輸入名字與群組代碼後只能查看。</p>
    </section>

    <section id="appArea" class="hidden">
      <div id="roleBanner" class="role"></div>

      <section class="card">
        <div class="between">
          <div>
            <h2 id="roomTitle"></h2>
            <p id="gameDate" class="muted"></p>
            <p id="gameState" class="game-state active"></p>
          </div>
          <button id="switchBtn" class="secondary small">切換群組</button>
        </div>

        <div id="playerAddArea" class="owner-only player-add">
          <select id="favoriteSelect">
            <option value="">常用玩家</option>
          </select>
          <input id="playerName" placeholder="請輸入名稱">
          <button id="addPlayerBtn">新增玩家</button>
        </div>

        <details id="favoriteManager" class="owner-only favorite-manager">
          <summary>管理常用玩家</summary>
          <div class="favorite-add-row">
            <input id="favoriteName" placeholder="輸入常用玩家名稱">
            <button id="addFavoriteBtn" class="secondary">加入常用</button>
          </div>
          <div id="favoriteList" class="favorite-list"></div>
          <p class="hint">刪除常用玩家只會從名單移除，不會刪除過去牌局或統計。</p>
        </details>

        <div id="players"></div>
      </section>

      <section class="card owner-only">
        <div class="between">
          <div>
            <h2>查看紀錄</h2>
            <p class="hint">只顯示對方輸入的名稱、匿名裝置代碼與查看時間；不代表真實身分。</p>
          </div>
          <button id="clearViewerLogsBtn" class="danger small">清空紀錄</button>
        </div>
        <div id="viewerLogList"></div>
      </section>

      <section class="card">
        <h2>本局驗帳</h2>
        <div class="totals">
          <div><span>總買入</span><strong id="totalBuyin">$0</strong></div>
          <div><span>總拿回</span><strong id="totalCashout">$0</strong></div>
          <div><span>差額</span><strong id="difference">$0</strong></div>
        </div>
        <p id="differenceHint" class="hint"></p>
        <div class="owner-only actions">
          <button id="finishBtn">完成本局</button>
          <button id="editCurrentBtn" class="secondary hidden">修改本局</button>
          <button id="finishEditBtn" class="secondary hidden">完成修改</button>
          <button id="newGameBtn" class="secondary">開新局</button>
        </div>
      </section>

      <section class="card">
        <div class="between">
          <h2>累積統計</h2>
          <select id="range">
            <option value="month">本月</option>
            <option value="year">今年</option>
            <option value="all">全部</option>
          </select>
        </div>
        <div id="report"></div>

        <h2 class="history-title">牌局紀錄</h2>
        <p class="hint">房主可修改已完成的牌局，追加玩家、買入及拿回金額；空白牌局不會列入紀錄或統計。</p>
        <div id="gameHistory"></div>
      </section>
    </section>
  </main>

  <template id="playerTemplate">
    <article class="player">
      <div class="between">
        <div>
          <h3 class="pname"></h3>
          <small class="pmeta muted"></small>
        </div>
        <div class="owner-control player-tools">
          <button class="secondary small renameBtn">修改名稱</button>
          <button class="danger small deleteBtn">刪除</button>
        </div>
      </div>

      <div class="totals">
        <div><span>投入</span><strong class="pbuy">$0</strong></div>
        <div><span>拿回</span><strong class="pcash">$0</strong></div>
        <div><span>盈虧</span><strong class="pprofit">$0</strong></div>
      </div>

      <div class="owner-control actions">
        <button data-buy="100">+100</button>
        <button data-buy="200">+200</button>
        <button class="secondary customBtn">自訂</button>
      </div>

      <div class="owner-control cashrow">
        <input class="cashInput" type="number" min="0" inputmode="numeric" placeholder="最後拿回金額">
        <button class="secondary saveBtn">儲存</button>
      </div>

      <details>
        <summary>查看買入紀錄</summary>
        <ul class="txlist"></ul>
      </details>
    </article>
  </template>

  <script type="module" src="app.js?v=10"></script>
</body>
</html>
